branch_whitelist = [ "main" ]
from_latest_tag = false
ignore_merge_commits = true
tag_prefix = "v"

pre_bump_hooks = [
  "npm version {{version}} --no-git-tag-version",
  "npm install --lockfile-only"
]

[git_hooks.commit-msg]
script = """#!/bin/sh
set -e
cog verify --file $1
cog check
"""

[commit_types]
build = { changelog_title = "🏗️ Build System" }
chore = { changelog_title = "🧹 Miscellaneous Chores" }
ci = { changelog_title = "📦 Continuous Integration" }
docs = { changelog_title = "📖 Documentation" }
feat = { changelog_title = "🌟 Features", bump_minor = true }
fix = { changelog_title = "🐛 Bug Fixes", bump_patch = true }
perf = { changelog_title = "⚡ Performances Improvements" }
refactor = { changelog_title = "♻️ Refactoring" }
test = { changelog_title = "🧪 Tests" }

[changelog]
authors = [
  { username = "sylver", signature = "Richard Kemp" },
  { username = "louis-lamoureux", signature = "Louis-P. Lamoureux" }
]
owner = "fincura-ai"
path = "CHANGELOG.md"
remote = "github.com"
repository = "fuse-sdk-js"
template = "remote"
